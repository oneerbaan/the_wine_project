models:
  - name: wine_reviews_source
    columns:
      - name: product_name
        data_tests:
          - not_null
      - name: winery
        data_tests:
          - not_null
      - name: country
        data_tests:
          - not_null
      - name: variety
        data_tests:
          - not_null
      - name: region
        data_tests:
          - not_null
      - name: review_description
        data_tests:
          - not_null
      - name: designation
        data_tests:
          - spl_char
  - name: lcbo_products_source
    columns:
      - name: product_id
        data_tests:
           - not_null
           - unique
      - name: product_name
        data_tests:
          - not_null
          - unique
      - name: class
        data_tests:
          - accepted_values:
              arguments:
                values: ['wine','spirits','beers']
      - name: volume
        data_tests:
          - not_null
      - name: country
        data_tests:
          - spl_char